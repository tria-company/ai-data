services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      browserless:
        condition: service_started
    networks:
      - scraper-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - scraper-net
    restart: unless-stopped

  browserless:
    image: ghcr.io/browserless/chromium:latest
    ports:
      - "3333:3000"
    environment:
      - TIMEOUT=600000
      - CONCURRENT=2
      - HEALTH=true
    networks:
      - scraper-net
    restart: unless-stopped

  profile-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      browserless:
        condition: service_started
    networks:
      - scraper-net
    restart: unless-stopped
    command: ["npx", "tsx", "workers/profile-worker.ts"]

  post-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      browserless:
        condition: service_started
    networks:
      - scraper-net
    restart: unless-stopped
    command: ["npx", "tsx", "workers/post-worker.ts"]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - scraper-net
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "9999:8080"
    networks:
      - scraper-net
    restart: unless-stopped

  netdata:
    image: netdata/netdata:latest
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - scraper-net
    restart: unless-stopped

networks:
  scraper-net:
    driver: bridge
