# Map para WebSocket upgrade (Dozzle live log streaming)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS (mantém /.well-known/acme-challenge para renovação futura)
server {
    listen 80;
    server_name aidata.devops-apogeu.uk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name aidata.devops-apogeu.uk;

    ssl_certificate     /etc/letsencrypt/live/aidata.devops-apogeu.uk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidata.devops-apogeu.uk/privkey.pem;

    # SSL hardening básico
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (1 ano). CUIDADO: navegadores vão lembrar e exigir HTTPS por 1 ano.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Dozzle — live log viewer sob /logs/
    # Dozzle usa DOZZLE_BASE=/logs (ver docker-compose.yml) para servir assets corretamente
    location /logs/ {
        proxy_pass http://dozzle:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    # Netdata — monitoring dashboard sob /netdata/
    # Padrão oficial: https://learn.netdata.cloud/docs/netdata-agent/configuration/running-the-netdata-agent-behind-a-reverse-proxy/nginx
    location = /netdata {
        return 301 /netdata/;
    }
    location ~ /netdata/(?<ndpath>.*) {
        proxy_pass http://netdata:19999/$ndpath$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_pass_request_headers on;
        proxy_set_header Connection "keep-alive";
        proxy_store off;
    }

    # Proxy para o app Next.js
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
